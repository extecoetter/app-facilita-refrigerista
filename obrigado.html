
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Obrigado pela compra</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:linear-gradient(180deg,#0b6bcb 0%, #1e88ff 40%, #eef5fc 100%);
color:#1d2b3a;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

h1{
color:white;
text-align:center;
font-size:36px;
}

.subtitle{
text-align:center;
color:white;
margin-bottom:40px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
margin-bottom:20px;
}

label{
font-weight:bold;
display:block;
margin-top:15px;
}

input, textarea, select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.logo-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
margin-top:15px;
}

.logo-option{
border:2px solid #ddd;
border-radius:10px;
padding:15px;
text-align:center;
cursor:pointer;
}

button{
background:#0b6bcb;
color:white;
border:none;
padding:16px;
border-radius:10px;
font-size:18px;
margin-top:25px;
width:100%;
cursor:pointer;
}

button:hover{
background:#084f97;
}

.whatsapp{
background:#25D366;
text-align:center;
padding:15px;
border-radius:10px;
color:white;
text-decoration:none;
display:block;
margin-top:20px;
font-weight:bold;
}

</head>

</div>

</div>

</html>
